<div class="section">
    <h1 class="section-title anim anim-d1">{{titulo}}</h1>
    <p class="section-desc anim anim-d2">{{descripcion}}</p>
    
    <div class="proyectos-grid">
        <div class="card anim" *ngFor="let proyecto of proyectos">
            <div class="proyecto-header">
                <h3 class="card-title">{{proyecto.nombre}}</h3>
            </div>
            <div class="proyecto-content">
                <p class="card-text">{{proyecto.descripcion}}</p>
            </div>
        </div>
    </div>
</div>
